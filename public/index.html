<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonky</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- Dashboard View -->
  <div id="dashboard-view" class="view">
    <header class="app-header">
      <h1 class="app-title">Stonky</h1>
      <button id="refresh-btn" class="btn-icon" title="Refresh">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>
    <div id="portfolio-grid" class="portfolio-grid"></div>
  </div>

  <!-- Chart View -->
  <div id="chart-view" class="view hidden">
    <header class="app-header">
      <button id="back-btn" class="btn-icon" title="Back to portfolio">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="stock-header">
        <span id="chart-symbol" class="stock-symbol"></span>
        <span id="chart-name" class="stock-name"></span>
      </div>
      <div id="chart-price-info" class="chart-price-info"></div>
    </header>

    <div class="chart-controls">
      <div class="control-group">
        <span class="control-label">Period</span>
        <div class="btn-group" id="period-group">
          <button class="btn-seg" data-period="1w">1W</button>
          <button class="btn-seg" data-period="1mo">1M</button>
          <button class="btn-seg" data-period="3mo">3M</button>
          <button class="btn-seg active" data-period="6mo">6M</button>
          <button class="btn-seg" data-period="1y">1Y</button>
          <button class="btn-seg" data-period="2y">2Y</button>
          <button class="btn-seg" data-period="5y">5Y</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">Type</span>
        <div class="btn-group" id="type-group">
          <button class="btn-seg active" data-type="candlestick">Candle</button>
          <button class="btn-seg" data-type="line">Line</button>
        </div>
      </div>
      <div class="control-group">
        <label for="interval-select" class="control-label">Interval</label>
        <select id="interval-select" class="control-select">
          <option value="1m">1min</option>
          <option value="5m">5min</option>
          <option value="15m">15min</option>
          <option value="30m">30min</option>
          <option value="1h">1h</option>
          <option value="1d" selected>1day</option>
        </select>
      </div>
      <div class="control-group">
        <span class="control-label">Indicators</span>
        <div class="indicator-toggles">
          <button class="btn-tag" data-indicator="sma20">SMA 20</button>
          <button class="btn-tag" data-indicator="sma50">SMA 50</button>
          <button class="btn-tag" data-indicator="sma200">SMA 200</button>
          <button class="btn-tag" data-indicator="ema20">EMA 20</button>
          <button class="btn-tag" data-indicator="bb">BB</button>
          <button class="btn-tag active" data-indicator="volume">Volume</button>
          <button class="btn-tag" data-indicator="rsi">RSI</button>
          <button class="btn-tag" data-indicator="macd">MACD</button>
        </div>
      </div>
    </div>

    <div id="chart-area" class="chart-area">
      <div id="chart-loading" class="chart-loading">Loading…</div>
      <div id="main-chart" class="chart-pane"></div>
      <div id="volume-chart" class="chart-pane pane-small hidden"></div>
      <div id="rsi-chart" class="chart-pane pane-small hidden"></div>
      <div id="macd-chart" class="chart-pane pane-small hidden"></div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
